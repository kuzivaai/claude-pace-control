name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structural-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run structural tests
        run: bash scripts/test-output.sh
